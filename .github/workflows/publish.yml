on:
  release:
    types: [published]
    
permissions:
  contents: read
  id-token: write 
  
jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore -c Release -p:Version=${{github.ref_name}}
    - name: Pack
      run: >
        dotnet pack --no-build -c Release -o ./nuGetPackages `
          -p:RepositoryCommit=${{github.sha}} `
          -p:RepositoryBranch=main `
          -p:Version=${{github.ref_name}}
    - name: NuGet Login
      uses: NuGet/login@v1
      id: nuGetLogin
      with:
        user: ${{ secrets.NUGET_USER }}
    - name: Publish to NuGet
      run: dotnet nuget push './nuGetPackages/*.nupkg' `
              --api-key "${{ steps.nuGetLogin.outputs.NUGET_API_KEY }}" `
              --source https://api.nuget.org/v3/index.json
